<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <defs>
    <radialGradient id="orangeBall" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="55%" stop-color="#FF9520"/>
      <stop offset="100%" stop-color="#C24400"/>
    </radialGradient>
    <linearGradient id="redEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="blackPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>

  <!-- Red angled outer plate -->
  <path d="M14 18 L162 14 Q190 14 196 32 L208 70 Q196 88 168 88 L14 88 Q4 88 4 78 L4 28 Q4 18 14 18 Z" fill="url(#redEdge)"/>
  <!-- Black inner plate (slightly inset) -->
  <path d="M22 26 L162 22 Q186 22 190 38 L200 68 Q190 82 166 82 L22 82 Q12 82 12 74 L12 34 Q12 26 22 26 Z" fill="url(#blackPlate)"/>

  <!-- "true" small white text -->
  <text x="60" y="40" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="-0.5">true</text>

  <!-- ACADEMY -->
  <text x="22" y="60" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="18" font-weight="900" fill="#fff" letter-spacing="1.5">ACADEMY</text>
  <!-- FANTASIA -->
  <text x="22" y="78" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="18" font-weight="900" fill="#fff" letter-spacing="1.5">FANTASiA</text>

  <!-- Orange ball -->
  <circle cx="195" cy="38" r="32" fill="#000"/>
  <circle cx="195" cy="38" r="28" fill="url(#orangeBall)"/>

  <!-- "AF" inside ball -->
  <text x="195" y="50" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#1a1a1a">AF</text>
</svg>
